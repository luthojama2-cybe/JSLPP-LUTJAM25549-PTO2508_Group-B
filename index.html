<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="./styles.css" />
  <script defer src="./scripts.js" type="module"></script>

  <title>Kanban Task Management</title>
</head>

<body>

  <!-- Sidebar -->
  <nav class="side-bar">

    <div id="side-logo-div" class="sidebar-logo">
      <img id="logo" src="./assets/logo-light.svg" alt="Kanban logo" />
    </div>

    <div class="boards-nav-links-div">
      <h4>ALL BOARDS (1)</h4>
      <button class="board-btn">Launch Career</button>
    </div>

    <!-- Theme Toggle -->
    <div class="theme-toggle">
      <span>☀️</span>

      <label class="switch">
        <input type="checkbox" id="theme-toggle" />
        <span class="slider"></span>
      </label>

      <span>🌙</span>
    </div>

    <button id="toggle-sidebar-btn">Hide Sidebar</button>

  </nav>

  <button id="show-sidebar-btn">👀</button>

  <!-- Main Layout -->
  <div id="layout">

    <!-- Header -->
    <header>

      <div class="header-name-div">

        <!-- Mobile Menu Icon -->
        <img
          src="./assets/favicon.svg"
          id="mobile-menu-btn"
          class="logo-mobile"
          alt="Open menu"
        />

        <h2>Launch Career</h2>

      </div>

      <div class="add-task-wrapper">
        <button id="add-task-btn">+ Add Task</button>
      </div>

    </header>

    <!-- Board Area -->
    <div class="container">

      <div id="loading-message">Loading tasks...</div>
      <div id="error-message"></div>

      <main class="card-column-main">

        <div class="column-div" data-status="todo">
          <h4>TODO</h4>
          <div class="tasks-container"></div>
        </div>

        <div class="column-div" data-status="doing">
          <h4>DOING</h4>
          <div class="tasks-container"></div>
        </div>

        <div class="column-div" data-status="done">
          <h4>DONE</h4>
          <div class="tasks-container"></div>
        </div>

      </main>

    </div>

  </div>

  <!-- Task Modal -->
  <dialog id="task-modal">

    <form method="dialog" id="task-form">

      <div class="modal-header">
        <h3 id="modal-title">Task</h3>
        <button type="button" class="close-btn" id="close-modal-btn">
          &times;
        </button>
      </div>

      <label>Title</label>
      <input type="text" id="task-title" required />

      <label>Description</label>
      <textarea id="task-desc"></textarea>

      <label>Status</label>
      <select id="task-status">
        <option value="todo">To Do</option>
        <option value="doing">Doing</option>
        <option value="done">Done</option>
      </select>

      <div class="modal-actions">
        <button type="submit">Save Task</button>
        <button type="button" id="delete-task-btn">Delete</button>
      </div>

    </form>

  </dialog>

  <!-- Mobile Menu Modal -->
  <dialog id="mobile-menu-modal">

    <div class="mobile-menu">

      <div class="mobile-menu-header">
        <h4>ALL BOARDS (1)</h4>
        <button id="close-mobile-menu" class="close-btn">&times;</button>
      </div>

      <button class="board-btn">Launch Career</button>

      <div class="theme-toggle mobile-theme-toggle">
        <span>☀️</span>

        <label class="switch">
          <input type="checkbox" id="mobile-theme-toggle" />
          <span class="slider"></span>
        </label>

        <span>🌙</span>
      </div>

    </div>

  </dialog>

</body>
</html>
